<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Tentang Saya</title>
    <style>
        /* Reset dasar */
        * {
            margin: 2px;
            padding: 2px;
            box-sizing: border-box;
        }

        /* Pengaturan Background Utama menggunakan foto Anda */
        body {
            height: 99vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

            /* Mengatur gambar background menggunakan foto Anda */
            background-image: url('fotoprofil.jpg');
            background-size: cover;         /* Gambar menutupi layar penuh */
            background-position: center;    /* Posisi gambar di tengah */
            background-repeat: no-repeat;   /* Tidak diulang */
            background-attachment: fixed;   /* Background tetap saat digulir */

            /* Overlay gelap agar teks dan kartu login kontras serta mudah dibaca */
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* Menambahkan lapisan gelap semi-transparan di atas background image */
        body::before {
            content: "";
            position: absolute;
            top: 2;
            left: 2;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6); /* Hitam transparan 60% */
            z-index: -1; /* Di bawah semua konten */
        }

        /* --- Styling Header Navigasi --- */
        header {
            background-color: rgba(243, 244, 243, 0.982);
            padding: 15px 50px;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
        }

        /* Styling Bagian Logo/Identitas */
        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-right: 40px;
        }

        .logo-img {
            width: 40px;
            height: 40px;
            object-fit: cover;
            border-radius: 50%;
        }

        header h1 {
            color: #0056b3;
            font-size: 22px;
        }

        header nav ul {
            list-style: none;
            display: flex;
            gap: 25px;
        }

        header nav a {
            text-decoration: none;
            color: #333;
            font-weight: 600;
            font-size: 16px;
            transition: color 0.3s;
        }

        header nav a:hover {
            color: #0056b3;
        }

        /* --- Styling Bagian Utama (Login Container) --- */
        .login-main-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding-top: 80px;
        }

        /* Tampilan Kartu Login */
        .login-card {
            background: #ffffffa2;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(255, 255, 255, 0.3);
            width: 350px;
            text-align: center;
        }

        .login-card h2 {
            margin-bottom: 25px;
            color: #333333;
            font-size: 28px;
        }

        /* Styling Input dan Tombol */
        .login-card input {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }

        .login-card button {
            width: 100%;
            padding: 12px;
            background-color: #0056b3;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .login-card button:hover {
            background-color: #004494;
        }
    </style>
</head>
<body>

    <!-- Header Navigasi -->
    <header>
        <div class="logo-container">
            <img src="image_57c4a5.png" alt="Foto Profil" class="logo-img">
            <h1>Tentang Saya</h1>
        </div>
        <nav>
            <ul>
                <li><a href="#">Beranda</a></li>
                <li><a href="#">Kisah Cerita</a></li>
            </ul>
        </nav>
    </header>

    <!-- Bagian Utama Login -->
    <section class="login-main-wrapper">
        <div class="login-card">
            <h2>Login</h2>

            <form onsubmit="event.preventDefault(); AuthManager.checkLogin();">
                <input type="text" id="username" placeholder="Username" required>
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit">Masuk</button>
            </form>
        </div>
    </section>

    <!-- Pastikan file script.js ada -->
    <script src="script.js"></script>

</body>
</html>
